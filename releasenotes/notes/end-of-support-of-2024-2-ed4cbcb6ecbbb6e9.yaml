---
prelude: |
    This is an intermediate release during the 2026.2 development cycle to
    mark the end of support for 2024.2 release in Tempest.
    After this release, Tempest will support below OpenStack Releases:
    * 2026.1
    * 2025.2
    * 2025.1
    Current development of Tempest is for OpenStack 2026.2 development
    cycle.
