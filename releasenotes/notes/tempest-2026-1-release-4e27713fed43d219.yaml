---
prelude: |
    This release is to tag Tempest for OpenStack 2026.1 release.
    This release marks the start of 2026.1 release support in Tempest.
    After this release, Tempest will support below OpenStack Releases:

    * 2026.1
    * 2025.2
    * 2025.1
    * 2024.2

    Current development of Tempest is for OpenStack 2026.2 development
    cycle. Every Tempest commit is also tested against master during
    the 2026.2 cycle. However, this does not necessarily mean that using
    Tempest as of this tag will work against a 2026.2 (or future release)
    cloud.
    To be on safe side, use this tag to test the OpenStack 2026.1 release.
